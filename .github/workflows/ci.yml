name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync SvelteKit
        run: npm run prepare

      - name: Type-check
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build
